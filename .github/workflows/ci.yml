name: CI Pipeline

on:
  push:
    branches: [main, task-2, task-3, task-4]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 dvc

      - name: Lint
        run: flake8 src notebooks --count --show-source --statistics

      - name: Test
        run: pytest -v

      - name: DVC check
        run: dvc status || true
