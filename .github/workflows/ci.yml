name: CI Pipeline

on:
  push:
    branches: [main, task-2, task-3, task-4]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 dvc

      # 5. Lint check (optional but good practice)
      - name: Run flake8
        run: |
          flake8 src notebooks --count --show-source --statistics

      # 6. Run tests
      - name: Run pytest
        run: pytest -v

      # 7. Verify DVC structure (safe check, no remote needed)
      - name: DVC status check
        run: |
          dvc status || true
